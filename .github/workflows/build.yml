name: build-and-deploy

on:
  schedule:
    - cron: '23 * * * *' # hourly: regenerate the page + record a rank snapshot
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: extension engine must match lib engine
        run: cmp lib/engine.js extension/engine.js

      - name: generate reranked front page
        run: node rerank.js 30 6 --out=site/index.html

      - name: rasterize OG card (site/og.svg -> site/og.png)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q --no-install-recommends librsvg2-bin
          rsvg-convert site/og.svg -w 1200 -h 630 -o site/og.png

      - name: record + commit rank snapshot (feeds the shadow-rank detector)
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          git pull --rebase --autostash origin main
          node scripts/snapshot.js
          git add data/snapshots
          git diff --cached --quiet || git commit -m "snapshot $(date -u +%FT%TZ)"
          git push || (git pull --rebase --autostash origin main && git push)

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
